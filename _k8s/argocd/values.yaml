# values.yaml — Argo CD pour le lab Talos (chart argo/argo-cd).
#
# Principe d'expo : le TLS est terminé par **Envoy Gateway** (cert wildcard
# `*.talos.lab.ops.nc` fourni par cert-manager). argocd-server tourne donc EN CLAIR
# (`server.insecure=true`) : Envoy fait le HTTPS devant, HTTP derrière. Sans ça,
# argocd-server ferait sa propre redirection 307 http->https => boucle infinie
# derrière un proxy qui termine déjà le TLS.

global:
  # Domaine externe : sert d'URL de base ET d'hôte pour la route/UI.
  domain: argo.talos.lab.ops.nc

configs:
  params:
    # HTTP interne — le HTTPS est assuré par le Gateway (voir httproute.yaml).
    server.insecure: true
  cm:
    # URL publique (liens générés, callbacks). Déduite de global.domain, explicitée ici.
    url: https://argo.talos.lab.ops.nc

# Lab mono-utilisateur : pas de SSO → Dex coupé (un pod de moins sur des nodes à 2 Go).
# L'auth se fait avec l'admin local (mot de passe initial dans un Secret, cf. README).
dex:
  enabled: false

# Coupé pour alléger ; réactiver si tu veux des notifications (Slack, etc.).
notifications:
  enabled: false

# ApplicationSet laissé actif (générateurs GitOps) — contrôleur léger.
# redis en mono-instance (défaut du chart, non-HA) : suffisant pour le lab.
