# Émetteur ACME Let's Encrypt STAGING (DNS-01 Cloudflare).
# Certs NON trustés par les navigateurs, mais quotas très larges : à utiliser D'ABORD
# pour valider la chaîne DNS-01 sans cramer les quotas de production.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: valentin@ops.nc
    privateKeySecretRef:
      name: letsencrypt-staging-account-key   # clé de compte ACME (créée par cert-manager)
    solvers:
      - dns01:
          cloudflare:
            apiTokenSecretRef:
              name: cloudflare-api-token       # cf. 01-cloudflare-api-token
              key: api-token
        selector:
          dnsZones:
            - ops.nc                           # zone Cloudflare gérant *.lab.ops.nc
