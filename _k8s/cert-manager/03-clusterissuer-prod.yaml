# Émetteur ACME Let's Encrypt PRODUCTION (DNS-01 Cloudflare).
# Certs publiquement trustés. Ne basculer ici qu'APRÈS avoir validé en staging
# (quotas prod limités : ~5 certs identiques / semaine).
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: valentin@ops.nc
    privateKeySecretRef:
      name: letsencrypt-prod-account-key
    solvers:
      - dns01:
          cloudflare:
            apiTokenSecretRef:
              name: cloudflare-api-token
              key: api-token
        selector:
          dnsZones:
            - ops.nc
