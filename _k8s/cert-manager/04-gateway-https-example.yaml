# Gateway `main-gateway` AVEC écouteur HTTPS wildcard + intégration cert-manager.
#
# À FUSIONNER dans _k8s/Envoy-Proxy/Envoy-Proxy.yml (bloc Gateway), ou à appliquer tel
# quel (il REMPLACE le Gateway existant — mêmes name/namespace).
#
# Mécanique (nécessite cert-manager installé avec config.enableGatewayAPI=true) :
#   1. cert-manager voit l'annotation + l'écouteur TLS avec un certificateRefs.
#   2. Il crée un Certificate pour *.talos.lab.ops.nc (dnsNames déduits du `hostname`).
#   3. Il le résout en DNS-01 Cloudflare et remplit le Secret `wildcard-talos-lab-ops-nc-tls`.
#   4. Envoy sert ce cert sur :443.
#
# Le Secret et le Certificate sont créés dans le namespace du Gateway (ici `envoy-gateway-system`).
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: main-gateway
  namespace: envoy-gateway-system
  annotations:
    # letsencrypt-staging pour tester, puis letsencrypt-prod pour un cert trusté
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  gatewayClassName: envoy
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: All
    - name: https
      protocol: HTTPS
      port: 443
      hostname: "*.talos.lab.ops.nc"
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: wildcard-talos-lab-ops-nc-tls     # rempli automatiquement par cert-manager
      allowedRoutes:
        namespaces:
          from: All
