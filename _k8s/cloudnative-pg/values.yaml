# values.yaml — opérateur CloudNativePG pour le lab Talos (chart cnpg/cloudnative-pg).
#
# Cet opérateur gère le CYCLE DE VIE de clusters PostgreSQL déclaratifs (CRD `Cluster`) :
# provisioning, réplication streaming, failover automatique, backups, rolling updates.
# C'est le pattern « operator » par excellence — idéal pour un module de formation.
#
# Ici on n'installe que l'OPÉRATEUR (léger, 1 pod). Le cluster PG de démo (3 nœuds sur
# Longhorn) est un objet `Cluster` à part : voir cluster-demo.yaml.
#
# Choix « lab » : opérateur en 1 replica, resources par défaut du chart (déjà sobres).
# PodMonitor de l'opérateur désactivé tant que kube-prometheus-stack n'est pas là.

replicaCount: 1

monitoring:
  # Le CRD PodMonitor n'existe qu'après kube-prometheus-stack → laisser false pour l'instant.
  podMonitorEnabled: false
