# Expose l'UI Policy Reporter (dashboard des verdicts Kyverno) en HTTPS sous
# `kyverno.talos.lab.ops.nc`, derrière `main-gateway` (Envoy Gateway). Le TLS est
# le wildcard `*.talos.lab.ops.nc` déjà porté par l'écouteur `https` (cert-manager) —
# aucun Certificate à créer, le wildcard couvre `kyverno.talos.lab.ops.nc`.
#
# La route vit dans le namespace `kyverno` mais s'attache au Gateway du namespace
# `envoy-gateway-system` : possible car `main-gateway` ouvre ses écouteurs à `from: All`.
# Backend dans le même namespace que la route → pas de ReferenceGrant.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: policy-reporter-ui
  namespace: kyverno
spec:
  parentRefs:
    - name: main-gateway
      namespace: envoy-gateway-system
      sectionName: https          # cible l'écouteur TLS :443
  hostnames:
    - kyverno.talos.lab.ops.nc     # matche le wildcard *.talos.lab.ops.nc
  rules:
    - backendRefs:
        # UI Policy Reporter — HTTP en clair (8080), Envoy fait le HTTPS devant.
        - name: policy-reporter-ui
          port: 8080
