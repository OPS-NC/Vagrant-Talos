# 04 — VALIDATE (Audit) : interdit les conteneurs privilégiés.
#
# Pédagogie : recoupe le PodSecurity `baseline` de Talos, mais montre comment Kyverno
# exprime une règle de sécurité (et pourrait aller plus loin que PSA : exceptions ciblées,
# messages personnalisés, rapport centralisé). `=(...)` = "si le champ existe, il doit
# valoir ça" — évite de rendre securityContext obligatoire juste pour tester privileged.
#
# NOTE : `longhorn-system` est labellisé `privileged` (il en a besoin) ; cette policy le
# signalera en Audit — c'est attendu et illustre justement l'intérêt d'une PolicyException
# (cf. README, scénario « exception »).
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: disallow-privileged-containers
  annotations:
    policies.kyverno.io/title: Disallow privileged containers
    policies.kyverno.io/category: Sécurité (Pod Security Baseline)
    policies.kyverno.io/severity: high
    policies.kyverno.io/description: >-
      Les conteneurs privilégiés désactivent l'isolation et donnent un accès quasi-root
      à l'hôte. Interdits. Mode Audit.
spec:
  validationFailureAction: Audit
  background: true
  rules:
    - name: privileged-containers
      match:
        any:
          - resources:
              kinds: [Pod]
      validate:
        message: "Les conteneurs privilégiés sont interdits."
        pattern:
          spec:
            =(ephemeralContainers):
              - =(securityContext):
                  =(privileged): "false"
            =(initContainers):
              - =(securityContext):
                  =(privileged): "false"
            containers:
              - =(securityContext):
                  =(privileged): "false"
