# 10 — MUTATE : ajoute automatiquement un label de traçabilité aux Pods à l'admission.
#
# Pédagogie : le 2e superpouvoir de Kyverno après validate. `mutate` RÉÉCRIT la ressource
# entrante. Ici on ajoute `lab.talos/managed-by: kyverno` s'il est absent (`+(...)` =
# "ajoute cette clé si elle n'existe pas, ne l'écrase jamais"). Inoffensif : un label de
# plus ne casse aucun workload. Ne s'applique qu'aux NOUVEAUX Pods (mutation à l'admission).
#
# Démo : créez un Pod sans ce label, puis `kubectl get pod <x> --show-labels` → il est là.
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: add-managed-by-label
  annotations:
    policies.kyverno.io/title: Add managed-by label (mutate)
    policies.kyverno.io/category: Bonnes pratiques
    policies.kyverno.io/severity: low
    policies.kyverno.io/description: >-
      Ajoute le label `lab.talos/managed-by: kyverno` aux Pods qui ne l'ont pas.
      Démonstration de la mutation à l'admission.
spec:
  rules:
    - name: add-label
      match:
        any:
          - resources:
              kinds: [Pod]
      mutate:
        patchStrategicMerge:
          metadata:
            labels:
              +(lab.talos/managed-by): kyverno
