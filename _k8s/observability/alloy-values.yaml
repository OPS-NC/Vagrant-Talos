# alloy-values.yaml — Grafana Alloy : collecte les logs des pods et les pousse vers Loki.
#
# Alloy remplace Promtail (déprécié). Mode **DaemonSet lisant les fichiers /var/log/pods**
# (comme Promtail), PAS le streaming via l'API Kubernetes.
#
# POURQUOI le mode fichier : lire les logs via `loki.source.kubernetes` (API) fait transiter
# TOUS les logs de pods à travers le kube-apiserver — charge énorme qui, sur ce lab, a
# contribué à saturer les control-planes. En lisant directement /var/log/pods sur chaque
# node (un DaemonSet, une part par node), l'apiserver n'est PAS sollicité pour les logs :
# `discovery.kubernetes` ne fait qu'un watch léger de métadonnées pour étiqueter les lignes.

controller:
  type: daemonset
  # Tolère tout → un Alloy sur CHAQUE node, y compris les control-planes (logs apiserver/etcd).
  tolerations:
    - operator: Exists

alloy:
  # Lit /var/log/pods (fichiers appartenant à root) → tourne en root dans ce ns privileged.
  securityContext:
    runAsUser: 0
    runAsGroup: 0
    runAsNonRoot: false
  # Monte /var/log (hostPath) dans le conteneur → accès aux fichiers de log des pods.
  mounts:
    varlog: true
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 256Mi
  configMap:
    content: |-
      // 1. Découvre les pods (métadonnées seulement — watch léger, pas de logs via l'API).
      discovery.kubernetes "pods" {
        role = "pod"
      }

      // 2. Étiquette + construit le chemin du fichier de log de chaque conteneur.
      discovery.relabel "pod_logs" {
        targets = discovery.kubernetes.pods.targets
        rule {
          source_labels = ["__meta_kubernetes_namespace"]
          target_label  = "namespace"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_name"]
          target_label  = "pod"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_container_name"]
          target_label  = "container"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_name"]
          target_label  = "app"
        }
        // /var/log/pods/<ns>_<pod>_<uid>/<container>/*.log  (le * couvre le préfixe ns_pod_)
        rule {
          source_labels = ["__meta_kubernetes_pod_uid", "__meta_kubernetes_pod_container_name"]
          separator     = "/"
          action        = "replace"
          replacement   = "/var/log/pods/*$1/*.log"
          target_label  = "__path__"
        }
      }

      // 3. Ne suit QUE les fichiers présents sur ce node (les autres globs ne matchent rien).
      local.file_match "pod_logs" {
        path_targets = discovery.relabel.pod_logs.output
      }

      // 4. Lit les fichiers, puis parse le format CRI de containerd (Talos).
      loki.source.file "pod_logs" {
        targets    = local.file_match.pod_logs.targets
        forward_to = [loki.process.pod_logs.receiver]
      }
      loki.process "pod_logs" {
        stage.cri {}
        forward_to = [loki.write.default.receiver]
      }

      // 5. Pousse vers Loki (gateway du même namespace).
      loki.write "default" {
        endpoint {
          url = "http://loki-gateway.monitoring.svc.cluster.local/loki/api/v1/push"
        }
      }
