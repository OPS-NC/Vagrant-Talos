# Expose Grafana, Prometheus et Alertmanager en HTTPS via `main-gateway` (Envoy Gateway).
# TLS = wildcard `*.talos.lab.ops.nc` (cert-manager) déjà porté par l'écouteur `https` —
# aucun Certificate à créer. Routes dans le ns `monitoring`, backends dans le même ns.
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: grafana
  namespace: monitoring
spec:
  parentRefs:
    - name: main-gateway
      namespace: envoy-gateway-system
      sectionName: https
  hostnames:
    - grafana.talos.lab.ops.nc
  rules:
    - backendRefs:
        - name: kube-prometheus-stack-grafana
          port: 80
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: prometheus
  namespace: monitoring
spec:
  parentRefs:
    - name: main-gateway
      namespace: envoy-gateway-system
      sectionName: https
  hostnames:
    - prometheus.talos.lab.ops.nc
  rules:
    - backendRefs:
        - name: kube-prometheus-stack-prometheus
          port: 9090
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: alertmanager
  namespace: monitoring
spec:
  parentRefs:
    - name: main-gateway
      namespace: envoy-gateway-system
      sectionName: https
  hostnames:
    - alertmanager.talos.lab.ops.nc
  rules:
    - backendRefs:
        - name: kube-prometheus-stack-alertmanager
          port: 9093
