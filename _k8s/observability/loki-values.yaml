# loki-values.yaml — Loki en mode « single binary » pour le lab Talos (chart grafana/loki).
#
# Le chart grafana/loki vise par défaut un déploiement « SimpleScalable » (read/write/backend
# séparés + object storage type S3 + caches memcached de plusieurs Go). BEAUCOUP trop pour un
# lab. Ici on bascule en **SingleBinary** + stockage **filesystem** sur un PVC Longhorn, et on
# COUPE les caches memcached (chunksCache=8Gi, resultsCache=1Gi par défaut !).

deploymentMode: SingleBinary

loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  # Schéma d'index requis (TSDB v13) — sinon le chart refuse de démarrer.
  schemaConfig:
    configs:
      - from: "2024-04-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: loki_index_
          period: 24h
  storage:
    type: filesystem
  limits_config:
    retention_period: 72h
  # Loki tourne en non-root : compatible PodSecurity baseline (défaut Talos).

# Le seul composant actif : le binaire unique, persistant sur Longhorn (1 réplica bloc).
singleBinary:
  replicas: 1
  persistence:
    enabled: true
    storageClass: longhorn-r1
    size: 3Gi
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 512Mi

# On neutralise tous les composants du mode scalable.
read:
  replicas: 0
write:
  replicas: 0
backend:
  replicas: 0

# Caches memcached : COUPÉS (sinon ~9Gi de RAM demandés à eux seuls).
chunksCache:
  enabled: false
resultsCache:
  enabled: false

# Le gateway nginx sert de point d'entrée unique (push + query) → loki-gateway:80.
gateway:
  enabled: true
  replicas: 1

# Extras inutiles au lab.
lokiCanary:
  enabled: false
test:
  enabled: false
minio:
  enabled: false
