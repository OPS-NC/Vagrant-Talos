# values.yaml — Trivy Operator pour le lab Talos (chart aqua/trivy-operator).
#
# Trivy Operator scanne EN CONTINU le cluster et produit des CRDs de rapport :
#   - VulnerabilityReport   (CVE des images)
#   - ConfigAuditReport     (mauvaises configs des workloads)
#   - ExposedSecretReport   (secrets en clair dans les images)
#   - RbacAssessmentReport  (RBAC trop permissif)
#   - ClusterComplianceReport (CIS / NSA…)
#
# Ces rapports ne sont PAS des PolicyReport wgpolicyk8s : c'est le **plugin trivy** de
# Policy Reporter (activé dans ../kyverno/policy-reporter-values.yaml) qui les remonte
# dans la MÊME UI que Kyverno. Un seul tableau de bord sécurité pour tout le lab.
#
# Choix « lab » : on limite la concurrence des jobs de scan (chaque job = un pod qui pull
# l'image + la base de CVE) pour ne pas saturer des nodes modestes, et on réduit le bruit
# (CVE HIGH/CRITICAL corrigeables uniquement).

operator:
  # Au plus 2 jobs de scan en parallèle (défaut 10) : évite un pic RAM/CPU sur le lab.
  scanJobsConcurrentLimit: 2
  # Un rapport de vuln est ré-évalué toutes les 24 h.
  scannerReportTTL: "24h"

trivy:
  # Mode Standalone : chaque job embarque son scan (simple). Pour un gros cluster, préférer
  # `builtInTrivyServer: true` (un serveur trivy partagé garde la base de CVE en cache).
  mode: Standalone
  # N'affiche que les CVE pour lesquelles un correctif existe (réduit le bruit en formation).
  ignoreUnfixed: true
  # On se concentre sur ce qui compte pour une démo.
  severity: "HIGH,CRITICAL"

# ServiceMonitor Prometheus : DÉSACTIVÉ tant que kube-prometheus-stack n'est pas installé
# (sinon le CRD ServiceMonitor n'existe pas → échec du helm apply). À passer à true après.
serviceMonitor:
  enabled: false
