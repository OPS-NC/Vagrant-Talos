# Expose l'UI + l'API Vault en HTTPS sous `vault.talos.lab.ops.nc` via Envoy Gateway.
# Cert = wildcard `*.talos.lab.ops.nc` porté par l'écouteur `https` de main-gateway
# (cert-manager) — aucun Certificate dédié.
#
# Backend = service `vault-active` : seul le nœud Vault ACTIF (leader) y est routé, ce qui
# évite les redirections 307 des standbys. Ce service n'a d'endpoints qu'une fois Vault
# initialisé ET descellé (unseal).
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: vault
  namespace: vault
spec:
  parentRefs:
    - name: main-gateway
      namespace: envoy-gateway-system
      sectionName: https
  hostnames:
    - vault.talos.lab.ops.nc
  rules:
    - backendRefs:
        - name: vault-active
          port: 8200
