# values.yaml — HashiCorp Vault en HA (intégré Raft) sur ce lab Talos.
# Chart hashicorp/vault 0.34.0 (Vault 2.0.3). Namespace: vault (aligné avec le VSO :
# http://vault.vault.svc.cluster.local:8200).
#
# - Stockage : Raft intégré, 1 PVC Longhorn de 2Gi par réplica (RWO).
# - TLS : terminé par Envoy Gateway (cert wildcard) → Vault écoute en HTTP en interne
#   (tls_disable). Le VSO s'y connecte en http via le service ClusterIP.
# - disable_mlock=true : sûr sur Talos (pas de swap) et évite d'exiger IPC_LOCK.
# - injector désactivé : on utilise le Vault Secrets Operator (VSO), pas les sidecars.

global:
  enabled: true
  tlsDisable: true

injector:
  enabled: false

ui:
  enabled: true
  serviceType: ClusterIP          # exposition via HTTPRoute, pas de LoadBalancer

server:
  dataStorage:
    enabled: true
    size: 2Gi
    storageClass: longhorn
    accessMode: ReadWriteOnce
  auditStorage:
    enabled: false

  resources:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 512Mi

  # Répartit les 3 réplicas sur des nodes distincts (défaut du chart, explicité).
  affinity: |
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        - labelSelector:
            matchLabels:
              app.kubernetes.io/name: {{ template "vault.name" . }}
              component: server
          topologyKey: kubernetes.io/hostname

  ha:
    enabled: true
    replicas: 3
    raft:
      enabled: true
      setNodeId: true
      config: |
        ui = true
        disable_mlock = true

        listener "tcp" {
          address       = "[::]:8200"
          cluster_address = "[::]:8201"
          tls_disable   = 1
        }

        storage "raft" {
          path = "/vault/data"
          retry_join { leader_api_addr = "http://vault-0.vault-internal:8200" }
          retry_join { leader_api_addr = "http://vault-1.vault-internal:8200" }
          retry_join { leader_api_addr = "http://vault-2.vault-internal:8200" }
        }

        service_registration "kubernetes" {}
