# VaultConnection : OÙ est Vault (adresse, TLS, CA). OPTIONNEL si defaultVaultConnection
# est activé dans values.yaml (il pose déjà un VaultConnection "default" cluster-wide).
# On le fournit ici pour documenter les champs et pour un Vault propre à ce namespace.
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultConnection
metadata:
  name: vault-conn
  namespace: demo
spec:
  # In-cluster (chart hashicorp/vault dans le ns "vault") :
  address: http://vault.vault.svc.cluster.local:8200
  # Externe / via Gateway du lab : https://vault.lab.ops.nc
  # En HTTPS avec CA privée, référencer le Secret (clé "ca.crt") + le nom TLS :
  # caCertSecretRef: vault-ca
  # tlsServerName: vault.lab.ops.nc
  # skipTLSVerify=true : LAB UNIQUEMENT.
  skipTLSVerify: false
  # headers: {}        # en-têtes HTTP custom éventuels (proxy, namespace HCP...)
