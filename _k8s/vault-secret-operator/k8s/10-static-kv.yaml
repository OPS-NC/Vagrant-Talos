# VaultStaticSecret : synchronise un secret KV-v2 -> Secret Kubernetes.
# Cas d'usage : mots de passe, clés d'API, config sensible qui change rarement.
# VSO relit Vault toutes les refreshAfter et met à jour le Secret si la valeur a changé (drift).
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: static-kv
  namespace: demo
spec:
  vaultAuthRef: vault-auth-static     # -> role Vault vso-static -> policy vso-static-kv
  type: kv-v2                         # kv-v1 possible aussi
  mount: kvv2                         # mount côté Vault (cf. vault/00-secrets-engines.sh)
  path: demo/app                      # chemin du secret (kvv2/demo/app)
  # version: 2                        # version KV-v2 précise (défaut : la dernière)
  refreshAfter: 60s                   # fréquence de resync (proportionnel à la sensibilité)
  hmacSecretData: true                # détecte la dérive sans logguer les valeurs en clair
  # Redémarre l'app quand le Secret change (sinon l'ancienne valeur reste en mémoire du process).
  rolloutRestartTargets:
    - kind: Deployment
      name: demo-app
  destination:
    create: true                      # VSO crée le Secret K8s
    name: static-kv                   # nom du Secret produit
    # type: Opaque                    # défaut
    # transformation:                 # cf. 40-secrettransformation.yaml pour reformater
    #   transformationRefs:
    #     - name: app-env
