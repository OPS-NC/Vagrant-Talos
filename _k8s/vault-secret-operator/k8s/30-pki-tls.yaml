# VaultPKISecret : émet un certificat TLS via le moteur PKI de Vault -> Secret type kubernetes.io/tls.
# VSO réémet automatiquement AVANT expiration (expiryOffset) : rotation de certs sans intervention.
#
# Différence avec cert-manager (../cert-manager/) : cert-manager = certs PUBLICS (Let's Encrypt,
# exposition Internet). VaultPKISecret = PKI PRIVÉE interne (mTLS entre services, CA maison Vault).
# Les deux coexistent : Let's Encrypt en bordure, PKI Vault en interne.
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultPKISecret
metadata:
  name: pki-tls
  namespace: demo
spec:
  vaultAuthRef: vault-auth-pki        # -> role Vault vso-pki -> policy vso-pki
  mount: pki                          # moteur pki monté sur pki/
  role: demo                          # role PKI (borne domaines/durées, cf. 00-secrets-engines.sh)
  commonName: demo-app.lab.ops.nc     # CN du certificat (doit rester dans allowed_domains du role)
  # altNames: demo-app.demo.svc       # SAN DNS supplémentaires
  format: pem
  ttl: 24h                            # durée du cert
  expiryOffset: 1h                    # réémet 1h avant expiration
  revoke: true                        # révoque à la suppression du CR
  clear: true                         # vide le Secret à la suppression
  destination:
    create: true
    name: pki-tls
    type: kubernetes.io/tls           # -> clés tls.crt / tls.key (consommable par un Ingress/Gateway)
