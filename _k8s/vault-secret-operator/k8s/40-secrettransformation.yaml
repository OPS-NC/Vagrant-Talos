# SecretTransformation : reformate les données Vault AVANT écriture du Secret K8s.
# Utile quand une app attend un format précis (fichier .env, URL de connexion assemblée, clé
# renommée...). On référence cette transformation depuis destination.transformation d'un Vault*Secret.
apiVersion: secrets.hashicorp.com/v1beta1
kind: SecretTransformation
metadata:
  name: app-env
  namespace: demo
spec:
  # Templates : chaque clé produite dans le Secret final. .Secrets = données brutes de Vault.
  templates:
    # Assemble une URL de connexion à partir des creds dynamiques (dynamic-db).
    DATABASE_URL:
      text: 'postgresql://{{- .Secrets.username -}}:{{- .Secrets.password -}}@postgres.demo.svc:5432/app'
    # Recopie/renomme une clé telle quelle.
    APP_PASSWORD:
      text: '{{ .Secrets.password }}'
  # excludeRaw=true : ne PAS recopier les clés brutes de Vault dans le Secret (seuls les templates).
  excludeRaw: true
---
# Exemple de VaultStaticSecret qui utilise la transformation ci-dessus.
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: static-kv-templated
  namespace: demo
spec:
  vaultAuthRef: vault-auth-static
  type: kv-v2
  mount: kvv2
  path: demo/app
  refreshAfter: 60s
  destination:
    create: true
    name: app-env
    transformation:
      transformationRefs:
        - name: app-env
