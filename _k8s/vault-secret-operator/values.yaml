# Valeurs Helm du Vault Secrets Operator (chart hashicorp/vault-secrets-operator).
# Doc : https://developer.hashicorp.com/vault/docs/deploy/kubernetes/vso/installation

# --- VaultConnection par défaut -------------------------------------------------
# Pose UN VaultConnection nommé "default" à l'install : les CRD qui ne précisent pas
# de vaultConnectionRef l'utilisent. Évite de répéter l'adresse partout.
defaultVaultConnection:
  enabled: true
  # Adresse du serveur Vault. In-cluster (chart hashicorp/vault dans le ns "vault") :
  address: "http://vault.vault.svc.cluster.local:8200"
  # Externe / exposé par le Gateway du lab : "https://vault.talos.lab.ops.nc"
  # En HTTPS avec une CA privée, référencer le Secret contenant le CA (clé "ca.crt") :
  # caCertSecret: "vault-ca"
  # skipTLSVerify=true : LAB UNIQUEMENT (accepte n'importe quel cert). À NE PAS faire ailleurs.
  skipTLSVerify: false

# --- Méthode d'auth par défaut --------------------------------------------------
# On préfère un VaultAuth explicite par namespace (k8s/02-vaultauth.yaml), plus lisible
# et multi-tenant. On laisse donc le default désactivé. Décommenter pour un cluster mono-app.
defaultAuthMethod:
  enabled: false
  # namespace: ""            # namespace Vault (Vault Enterprise / HCP)
  # method: kubernetes
  # mount: kubernetes        # chemin du mount auth (auth/kubernetes)
  # kubernetes:
  #   role: vso-static       # role Vault (cf. vault/02-roles.sh)
  #   serviceAccount: default
  #   tokenAudiences: ["vault"]

controller:
  manager:
    # --- Cache client + chiffrement du cache -----------------------------------
    # persistenceModel:
    #   none              -> cache en RAM ; un redémarrage de l'opérateur PERD les leases
    #                        des creds dynamiques (creds orphelins côté Vault).
    #   direct-encrypted  -> cache persisté ET chiffré via le moteur Transit de Vault.
    #                        Les leases survivent au redémarrage -> pas d'orphelins. Recommandé.
    clientCache:
      persistenceModel: "direct-encrypted"
      cacheSize: 10000
      storageEncryption:
        enabled: true
        # Le cache est chiffré par une clé Transit dédiée (cf. vault/policies/vso-transit-cache.hcl
        # et vault/00-secrets-engines.sh). L'opérateur s'authentifie pour ce chiffrement via SON
        # propre ServiceAccount et un role Vault dédié (vso-transit).
        vaultConnectionRef: default
        method: kubernetes
        mount: kubernetes
        transitMount: transit
        keyName: vso-client-cache
        role: vso-transit
        # namespace: ""     # namespace Vault si Enterprise/HCP

# --- Télémétrie (optionnel, si Prometheus Operator présent) ---------------------
telemetry:
  serviceMonitor:
    enabled: false          # passer à true si l'opérateur Prometheus + ses CRD sont installés
