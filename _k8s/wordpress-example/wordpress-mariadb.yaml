# WordPress + MariaDB — démo de stockage persistant Longhorn, exposée via Envoy Gateway.
#
# - 2 volumes Longhorn de 2Gi (RWO) : /var/lib/mysql (MariaDB) et /var/www/html (WordPress).
# - Stratégie Recreate (volumes RWO mono-attach : l'ancien pod libère avant le nouveau).
# - Exposé en HTTPS sous wordpress.talos.lab.ops.nc (cert wildcard *.talos.lab.ops.nc).
#
# ⚠️ Mots de passe d'exemple (lab). À NE PAS réutiliser tel quel hors démo.
---
apiVersion: v1
kind: Namespace
metadata:
  name: wordpress-test
---
apiVersion: v1
kind: Secret
metadata:
  name: mariadb
  namespace: wordpress-test
type: Opaque
stringData:
  MARIADB_ROOT_PASSWORD: changeme-root-lab
  MARIADB_DATABASE: wordpress
  MARIADB_USER: wordpress
  MARIADB_PASSWORD: changeme-wp-lab
---
# ---------- MariaDB ----------
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mariadb-data
  namespace: wordpress-test
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: longhorn
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mariadb
  namespace: wordpress-test
  labels: { app: mariadb }
spec:
  replicas: 1
  strategy: { type: Recreate }
  selector:
    matchLabels: { app: mariadb }
  template:
    metadata:
      labels: { app: mariadb }
    spec:
      containers:
        - name: mariadb
          image: mariadb:11.4
          envFrom:
            - secretRef: { name: mariadb }
          ports:
            - { name: mysql, containerPort: 3306 }
          volumeMounts:
            - name: data
              mountPath: /var/lib/mysql
              subPath: mysql          # sous-dossier propre (évite le lost+found du volume)
          readinessProbe:
            exec: { command: ["healthcheck.sh", "--connect", "--innodb_initialized"] }
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            exec: { command: ["healthcheck.sh", "--connect", "--innodb_initialized"] }
            initialDelaySeconds: 60
            periodSeconds: 20
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits: { memory: 640Mi }
      volumes:
        - name: data
          persistentVolumeClaim: { claimName: mariadb-data }
---
apiVersion: v1
kind: Service
metadata:
  name: mariadb
  namespace: wordpress-test
spec:
  selector: { app: mariadb }
  ports:
    - { name: mysql, port: 3306, targetPort: 3306 }
---
# ---------- WordPress ----------
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: wordpress-data
  namespace: wordpress-test
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: longhorn
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wordpress
  namespace: wordpress-test
  labels: { app: wordpress }
spec:
  replicas: 1
  strategy: { type: Recreate }
  selector:
    matchLabels: { app: wordpress }
  template:
    metadata:
      labels: { app: wordpress }
    spec:
      containers:
        - name: wordpress
          image: wordpress:6.7-php8.3-apache
          env:
            - { name: WORDPRESS_DB_HOST, value: "mariadb:3306" }
            - { name: WORDPRESS_DB_NAME, value: "wordpress" }
            - { name: WORDPRESS_DB_USER, value: "wordpress" }
            - name: WORDPRESS_DB_PASSWORD
              valueFrom: { secretKeyRef: { name: mariadb, key: MARIADB_PASSWORD } }
            # TLS terminé par Envoy : on force la détection HTTPS via X-Forwarded-Proto
            # et on fige l'URL du site (sinon boucles de redirection / URLs en http).
            - name: WORDPRESS_CONFIG_EXTRA
              value: |
                define('WP_HOME', 'https://wordpress.talos.lab.ops.nc');
                define('WP_SITEURL', 'https://wordpress.talos.lab.ops.nc');
                if (isset($_SERVER['HTTP_X_FORWARDED_PROTO']) && $_SERVER['HTTP_X_FORWARDED_PROTO'] === 'https') {
                  $_SERVER['HTTPS'] = 'on';
                }
          ports:
            - { name: http, containerPort: 80 }
          volumeMounts:
            - name: data
              mountPath: /var/www/html
              subPath: wp
          readinessProbe:
            httpGet: { path: /wp-login.php, port: 80 }
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 6
          resources:
            requests: { cpu: 100m, memory: 192Mi }
            limits: { memory: 512Mi }
      volumes:
        - name: data
          persistentVolumeClaim: { claimName: wordpress-data }
---
apiVersion: v1
kind: Service
metadata:
  name: wordpress
  namespace: wordpress-test
spec:
  selector: { app: wordpress }
  ports:
    - { name: http, port: 80, targetPort: 80 }
---
# ---------- Exposition Gateway API ----------
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: wordpress
  namespace: wordpress-test
spec:
  parentRefs:
    - name: main-gateway
      namespace: envoy-gateway-system
      sectionName: https           # écouteur TLS :443 (cert wildcard cert-manager)
  hostnames:
    - wordpress.talos.lab.ops.nc
  rules:
    - backendRefs:
        - name: wordpress
          port: 80
