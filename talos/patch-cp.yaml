# Patch appliqué UNIQUEMENT aux control planes.
#
# - Pose la VIP (Virtual IP) de l'API Kubernetes sur la carte host-only.
#   La VIP flotte entre les control planes (élection via etcd) : c'est elle
#   qui sert d'endpoint stable https://192.168.56.5:6443, aussi bien en
#   single (1 CP) qu'en HA (3 CP).
# - On cible la carte par busPath et PAS par nom : depuis Talos 1.5 les
#   interfaces ont des noms "prédictibles" (la host-only n'est donc PAS "eth1"
#   mais "enp0s8"). busPath "0000:00:08.0" = 2e carte VirtualBox (host-only),
#   indépendamment du nom. Vérifier au besoin : talosctl -n <ip> get links
machine:
  network:
    interfaces:
      - deviceSelector:
          busPath: "0000:00:08.0"
        dhcp: true
        vip:
          ip: 192.168.56.5

cluster:
  # etcd s'annonce et écoute sur le réseau host-only (et pas sur l'IP NAT).
  etcd:
    advertisedSubnets:
      - 192.168.56.0/24

  # CNI flannel : par défaut flannel choisit l'IP publique de son tunnel VXLAN
  # sur l'interface de la ROUTE PAR DÉFAUT = la carte NAT (eth0, 10.0.2.15,
  # IDENTIQUE sur toutes les VMs). Résultat : tous les VTEP pointent vers un NAT
  # isolé => le trafic pod cross-node (donc le DNS vers CoreDNS sur un autre node)
  # est cassé. On force flannel à choisir l'interface qui atteint le réseau
  # host-only (--iface-can-reach = l'hôte 192.168.56.1) => VTEP sur enp0s8.
  # NB : rendu dans le manifeste au bootstrap. Sur un cluster DÉJÀ démarré, Talos
  # ne repousse pas la MàJ tout seul (cf. README §7) ; patcher le DaemonSet à la main.
  network:
    cni:
      name: flannel
      flannel:
        extraArgs:
          - --iface-can-reach=192.168.56.1
